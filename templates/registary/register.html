{% extends 'base.html' %}
{% load static %}

{% block title %} Register {% endblock %}

{% block css %}
    <link rel="stylesheet" type="text/css" href="{% static 'registary/styles.css' %}">
{% endblock %}

{% block content %}

    <form class="form-with-validation" method="post">

        {% csrf_token %}

        <h1> Register a New User </h1>

        {{ form }}

        <button class="form-submit">Sign Up</button>

        <div class="back-link">
            <p>
                Already have an account?
                <a href="{% url 'login' %}">Sign In</a>
            </p>
        </div>

    </form>


    
{% endblock %}
