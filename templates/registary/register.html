{% extends 'base.html' %}
{% load static %}

{% block title %} Register {% endblock %}

{% block css %}
    <link rel="stylesheet" type="text/css" href="{% static 'registary/styles.css' %}">
{% endblock %}

{% block content %}

    <h1> Register a New User </h1>

    <form class="form-with-validation" method="post">

        {% csrf_token %}

        {{ form }}

        <button class="form-submit">Submit</button>

    </form>
    

{% endblock %}
