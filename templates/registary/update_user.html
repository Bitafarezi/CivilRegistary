{% extends 'registary/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="form-with-validation mt-5">
            <h4 class="mb-4">Adjust Limits for {{ target_user.username }}</h4>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="daily_limit" class="form-label">Daily Search Limit</label>
                    <input type="number" name="daily_limit" id="daily_limit" class="form-control" value="{{ target_user.profile.daily_limit }}" required>
                </div>
                <div class="mb-3">
                    <label for="monthly_limit" class="form-label">Monthly Search Limit</label>
                    <input type="number" name="monthly_limit" id="monthly_limit" class="form-control" value="{{ target_user.profile.monthly_limit }}" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="form-submit">Update Limits</button>
                    <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
