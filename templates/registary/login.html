{% extends 'base.html' %}
{% load static %}

{% block title %} Login {% endblock %}

{% block css %}
    <link rel="stylesheet" type="text/css" href="{% static 'registary/styles.css' %}">
{% endblock %}


{% block content %}

    <form class="form-with-validation" method="post">

        {% csrf_token %}

        <h1> Log In</h1>

        {{ form }}

        <button class="form-submit">Log In</button>

        <div class="back-link">
            <p>
                Dont have an account?
                <a href="{% url 'register' %}">Sign Up</a>
            </p>
        </div>

    </form>

    

{% endblock %}
